<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMS - Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #2980b9, #6dd5fa);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background: #2980b9;
    color: white;
    border: none;
    cursor: pointer;
}

.msg {
    color: red;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="msg" id="msg"></p>

</div>


<script>

async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!email || !password) {
        msg.innerText = "Enter details";
        return;
    }

    msg.innerText = "Logging in...";

    try {

        const res = await fetch("http://localhost:8080/api/users/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const text = await res.text();
        console.log("Login response text:", text);

        if (!res.ok) {
            msg.innerText = text;
            return;
        }

        //convert to JSON
        const data = JSON.parse(text);

        console.log("Login response data:", data);

        // Save properly
        localStorage.clear();

        const role = data.role ? data.role.trim().toUpperCase():null;

        if(!role){
            msg.innerText = "Role not received from server";
            return;
        }
        localStorage.setItem("name", email);
        localStorage.setItem("userId", data.userId);
        localStorage.setItem("accessToken", data.accessToken);
        localStorage.setItem("refreshToken", data.refreshToken);
        localStorage.setItem("role", data.role);

        // fetch user profile
const profileRes = await fetch("http://localhost:8080/api/employee/my-profile",{
    headers:{
        "Authorization":"Bearer "+data.accessToken
    }
});

const profile = await profileRes.json();

localStorage.setItem("userId", profile.id);

console.log("USER ID =", profile.id);
       
        console.log("FINAL ROLE =", role);

        // Role Based Redirect
        if (role === "ADMIN") {
            window.location.href = "admin.html";
        } else {
            window.location.href = "employee.html";
        }

    } catch (e) {

        console.error("Login error:", e);
        msg.innerText = "Server Error (check console)";
    }
}

</script>

</body>
</html>
